name: Publish NuGet package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PACKAGE_OUTPUT: ${{ github.workspace }}/artifacts/packages
  GITHUB_NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:
  publish:
    name: Build, pack, and publish NuGet package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - id: version
        name: Resolve package version
        shell: bash
        run: |
          set -euo pipefail
          source_version="$(dotnet msbuild src/DeltaZulu.Forward/DeltaZulu.Forward.csproj -getProperty:Version -nologo | tail -n 1)"
          if ! [[ "$source_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Version '$source_version' is not a supported SemVer package version." >&2
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$source_version" ]]; then
              echo "Tag version '$tag_version' does not match source version '$source_version'." >&2
              exit 1
            fi
          fi

          echo "package_version=$source_version" >> "$GITHUB_OUTPUT"

      - name: Restore locked dependencies
        run: dotnet restore DeltaZulu.Forward.slnx --locked-mode

      - name: Build solution
        run: dotnet build DeltaZulu.Forward.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test src/DeltaZulu.Forward.Tests/DeltaZulu.Forward.Tests.csproj --configuration Release --no-build --no-restore

      - name: Pack library
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: dotnet pack src/DeltaZulu.Forward/DeltaZulu.Forward.csproj --configuration Release --no-build --no-restore --output "$PACKAGE_OUTPUT" /p:PackageVersion="$PACKAGE_VERSION"

      - name: Inspect package contents
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          package="$PACKAGE_OUTPUT/DeltaZulu.Forward.$PACKAGE_VERSION.nupkg"
          unzip -l "$package"
          unzip -Z1 "$package" | grep -Fx README.md
          unzip -Z1 "$package" | grep -Fx LICENSE.txt
          unzip -Z1 "$package" | grep -Fx 'lib/net10.0/DeltaZulu.Forward.dll'
          ! unzip -Z1 "$package" | grep -E '(^|/)(DeltaZulu\.Forward\.Tests|DeltaZulu\.Forward\.Examples)(/|\.)'

      - name: Publish package to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          config="$RUNNER_TEMP/github-packages-nuget.config"
          dotnet new nugetconfig --output "$RUNNER_TEMP" --force
          mv "$RUNNER_TEMP/nuget.config" "$config"
          dotnet nuget add source \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text \
            --name github \
            --configfile "$config" \
            "$GITHUB_NUGET_SOURCE"
          dotnet nuget push "$PACKAGE_OUTPUT"/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --configfile "$config" \
            --source github \
            --skip-duplicate
