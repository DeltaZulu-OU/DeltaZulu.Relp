name: Unit Tests

on:
  pull_request:
    paths:
      - '.github/*.yml'
      - '.github/workflows/*.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'NuGet.config'
      - '*.slnx'              # Triggers on any solution file changes without hardcoding the name
      - 'src/**'
      - 'tests/**'
  push:
    branches: [ main, master ]
    paths:
      - '.github/*.yml'
      - '.github/workflows/*.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'NuGet.config'
      - '*.slnx'
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  unit-tests:
    name: ${{ matrix.os }} unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Use 'recursive' to fetch nested submodules, or 'true' for just the top-level ones
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/**/*.trx
          if-no-files-found: ignore